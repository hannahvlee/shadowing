<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing Practice</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="tracks.js"></script>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --text: #f0ede8;
    --text-muted: #6e6e6e;
    --text-dim: #3e3e3e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    margin-bottom: 48px;
  }

  .track-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .track-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }

  .track-card:hover {
    border-color: var(--accent);
    background: rgba(200,240,96,0.04);
    transform: translateX(4px);
  }

  .track-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .track-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 24px;
  }

  .track-title {
    font-size: 16px;
    font-weight: 400;
  }

  .track-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .track-arrow {
    font-size: 18px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .track-card:hover .track-arrow {
    color: var(--accent);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label">📚 English Practice</div>
    <h1>어떻게 <em>연습</em>할까요?</h1>
    <p class="subtitle">학습 모드를 선택하세요</p>
  </header>

  <!-- Mode selector -->
  <div style="display:flex;gap:12px;margin-bottom:40px">
    <a href="#shadowing" onclick="setMode('shadowing')" id="mode-shadowing"
      style="flex:1;display:flex;align-items:center;gap:14px;padding:20px 24px;background:var(--surface);border:1.5px solid var(--accent);border-radius:12px;text-decoration:none;color:var(--text);transition:all 0.2s;">
      <span style="font-size:24px">🎙</span>
      <div>
        <div style="font-weight:500;margin-bottom:4px">섀도잉</div>
        <div style="font-size:12px;color:var(--text-muted)">듣고 따라 말하기</div>
      </div>
    </a>
    <a href="#listening" onclick="setMode('listening')" id="mode-listening"
      style="flex:1;display:flex;align-items:center;gap:14px;padding:20px 24px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;text-decoration:none;color:var(--text);transition:all 0.2s;">
      <span style="font-size:24px">🎧</span>
      <div>
        <div style="font-weight:500;margin-bottom:4px">청취 테스트</div>
        <div style="font-size:12px;color:var(--text-muted)">듣고 한국어로 번역</div>
      </div>
    </a>
  </div>

  <!-- Track list -->
  <div class="track-list" id="trackList"></div>
</div>

<script>
  let currentMode = 'shadowing';

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-shadowing').style.borderColor = mode === 'shadowing' ? 'var(--accent)' : 'var(--border)';
    document.getElementById('mode-listening').style.borderColor = mode === 'listening' ? 'var(--accent)' : 'var(--border)';
    renderTracks();
    return false;
  }

  function renderTracks() {
    const trackList = document.getElementById('trackList');
    trackList.innerHTML = '';
    TRACKS.forEach((track, i) => {
      const a = document.createElement('a');
      a.className = 'track-card';
      a.href = currentMode === 'shadowing' ? `player.html?id=${track.id}` : `listening.html?id=${track.id}`;
      a.innerHTML = `
        <div class="track-left">
          <span class="track-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="track-title">${track.title}</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px">
          <span class="track-count">${track.sentences.length} sentences</span>
          <span class="track-arrow">→</span>
        </div>
      `;
      trackList.appendChild(a);
    });
  }

  renderTracks();
</script>
</body>
</html>
