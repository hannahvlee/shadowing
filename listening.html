<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청취 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="tracks.js"></script>
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --text: #f0ede8;
    --text-muted: #6e6e6e;
    --text-dim: #3e3e3e;
    --danger: #f06060;
    --success: #60f0a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  h1 em { font-style: italic; color: var(--accent); }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    margin-bottom: 32px;
  }

  /* API Key setup */
  .api-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 32px;
  }

  .api-setup p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .api-row {
    display: flex;
    gap: 10px;
  }

  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent); }

  .btn-save {
    padding: 10px 18px;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }

  .btn-save:hover { opacity: 0.85; }

  .api-saved {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--success);
    margin-top: 8px;
    display: none;
  }

  /* Track selector */
  .track-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .track-btn {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .track-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .track-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.06); }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Main test card */
  .test-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 16px;
  }

  .sentence-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }

  /* Play button */
  .play-area {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .btn-play-main {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: transparent;
    border: 1.5px solid var(--accent2);
    border-radius: 10px;
    color: var(--accent2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-play-main:hover { background: rgba(96,200,240,0.08); }
  .btn-play-main.playing { background: rgba(96,200,240,0.08); }

  .play-hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Record area */
  .record-area {
    margin-bottom: 24px;
  }

  .record-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .btn-record-main {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-record-main:hover { border-color: var(--danger); color: var(--danger); }

  .btn-record-main.recording {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(240,96,96,0.08);
    animation: pulse-red 1s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(240,96,96,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(240,96,96,0); }
  }

  .transcript-preview {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    min-height: 20px;
  }

  /* Result */
  .result-area {
    border-top: 1px solid var(--border);
    padding-top: 24px;
    margin-top: 8px;
    display: none;
  }

  .result-area.show { display: block; }

  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .score-big {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    line-height: 1;
  }

  .score-big.pass { color: var(--success); }
  .score-big.fail { color: var(--danger); }

  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .score-label.pass {
    background: rgba(96,240,160,0.12);
    color: var(--success);
    border: 1px solid rgba(96,240,160,0.3);
  }

  .score-label.fail {
    background: rgba(240,96,96,0.12);
    color: var(--danger);
    border: 1px solid rgba(240,96,96,0.3);
  }

  .feedback-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .answer-box {
    background: rgba(200,240,96,0.04);
    border: 1px solid rgba(200,240,96,0.15);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }

  .answer-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .answer-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  /* Navigation */
  .nav-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-nav {
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-nav:hover { border-color: var(--accent2); color: var(--accent2); }

  .btn-next {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #0e0e0e;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }

  .btn-next:hover { opacity: 0.85; }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Summary */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    display: none;
  }

  .summary-card.show { display: block; }

  .summary-score {
    font-family: 'DM Serif Display', serif;
    font-size: 64px;
    margin-bottom: 8px;
  }

  .summary-score.great { color: var(--success); }
  .summary-score.ok { color: var(--warn, #f0c060); }
  .summary-score.poor { color: var(--danger); }

  .summary-label {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 32px;
  }

  .btn-restart {
    padding: 12px 28px;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    margin: 0 6px;
  }

  .btn-restart:hover { opacity: 0.85; }

  .loading-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div style="margin-bottom:16px">
      <a href="index.html" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;">← Back</a>
    </div>
    <div class="label">🎧 Listening Test</div>
    <h1>듣고 <em>번역하기</em></h1>
    <p class="subtitle">음원을 듣고 한국어로 직역하세요</p>
  </header>

  <!-- Track selector -->
  <div class="track-selector" id="trackSelector"></div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Test card -->
  <div class="test-card" id="testCard">
    <div class="sentence-counter" id="sentenceCounter">문장 1 / 20</div>

    <div class="play-area">
      <button class="btn-play-main" id="playBtn" onclick="playCurrent()">▶ 듣기</button>
      <span class="play-hint" id="playHint">문장을 들어보세요</span>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn-nav" onclick="prevSentence()" id="prevBtnTop">← 이전</button>
      <button class="btn-nav" onclick="nextSentence()" style="margin-left:8px">다음 →</button>
    </div>
    <div class="record-area">
      <div class="record-label">한국어로 번역 녹음</div>
      <button class="btn-record-main" id="recBtn" onclick="toggleRecord()">⏺ 녹음 시작</button>
      <div class="transcript-preview" id="transcriptPreview"></div>
    </div>

    <div class="result-area" id="resultArea">
      <div class="score-row">
        <div class="score-big" id="scoreBig"></div>
        <div class="score-label" id="scoreLabel"></div>
      </div>
      <div class="feedback-box" id="feedbackBox"></div>
      <div class="answer-box" id="answerBox" style="display:none">
        <div class="answer-label">모범 번역</div>
        <div class="answer-text" id="answerText"></div>
      </div>
      <div class="nav-row">
        <button class="btn-nav" onclick="toggleAnswer()">모범 번역 보기</button>
        <button class="btn-nav" onclick="prevSentence()">← 이전</button>
        <button class="btn-next" id="nextBtn" onclick="nextSentence()">다음 →</button>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-card" id="summaryCard">
    <div class="summary-score" id="summaryScore"></div>
    <div class="summary-label" id="summaryLabel"></div>
    <br>
    <button class="btn-restart" onclick="restartTest()">다시 시작</button>
    <button class="btn-restart" onclick="location.href='index.html'" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">홈으로</button>
  </div>

</div>

<audio id="mainAudio" style="display:none"></audio>

<script>
// =====================
// CONFIG — API 키 여기에 직접 입력하거나 아래 입력창 사용
// =====================
const HARDCODED_API_KEY = ''; // 예: 'sk-ant-api03-...'

// State
let currentTrack = null;
let currentIndex = 0;
let scores = [];
let isRecording = false;
let mediaRecorder = null;
let sharedStream = null;
let sttRecognition = null;
let finalTranscript = '';
let showingAnswer = false;

const audio = document.getElementById('mainAudio');

// =====================
// API Key
// =====================
function getApiKey() {
  return HARDCODED_API_KEY || localStorage.getItem('claude_api_key') || '';
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('claude_api_key', key);
  document.getElementById('apiSaved').style.display = 'block';
  document.getElementById('apiKeyInput').value = '';
  setTimeout(() => {
    document.getElementById('apiSetup').style.display = 'none';
  }, 1000);
}

function checkApiKey() {
  const key = getApiKey();
  if (key) {
    document.getElementById('apiSetup').style.display = 'none';
  }
}

// =====================
// Track selector
// =====================
function renderTrackSelector() {
  const el = document.getElementById('trackSelector');
  TRACKS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'track-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.title;
    btn.onclick = () => selectTrack(i, btn);
    el.appendChild(btn);
  });
  selectTrack(0, el.children[0]);
}

function selectTrack(i, btn) {
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTrack = TRACKS[i];
  audio.src = currentTrack.file;
  currentIndex = 0;
  scores = [];
  showSentence();
}

// =====================
// Sentence display
// =====================
function showSentence() {
  const s = currentTrack.sentences;
  if (currentIndex >= s.length) { showSummary(); return; }

  document.getElementById('sentenceCounter').textContent = `문장 ${currentIndex + 1} / ${s.length}`;
  document.getElementById('progressFill').style.width = `${(currentIndex / s.length) * 100}%`;
  document.getElementById('playHint').textContent = '문장을 들어보세요';
  document.getElementById('playBtn').textContent = '▶ 듣기';
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('recBtn').textContent = '⏺ 녹음 시작';
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('transcriptPreview').textContent = '';
  document.getElementById('resultArea').classList.remove('show');
  document.getElementById('answerBox').style.display = 'none';
  document.getElementById('testCard').style.display = 'block';
  document.getElementById('summaryCard').classList.remove('show');
  showingAnswer = false;
  finalTranscript = '';
}

// =====================
// Audio playback
// =====================
function playCurrent() {
  const s = currentTrack.sentences[currentIndex];
  const btn = document.getElementById('playBtn');

  if (!audio.paused && audio.currentTime >= s.start && audio.currentTime < s.end) {
    audio.pause();
    btn.textContent = '▶ 듣기';
    btn.classList.remove('playing');
    return;
  }

  audio.currentTime = s.start;
  audio.playbackRate = 1.0;
  audio.play();
  btn.textContent = '⏸ 정지';
  btn.classList.add('playing');
  document.getElementById('playHint').textContent = '재생 중...';

  audio.ontimeupdate = () => {
    if (audio.currentTime >= s.end) {
      audio.pause();
      btn.textContent = '▶ 다시 듣기';
      btn.classList.remove('playing');
      document.getElementById('playHint').textContent = '이제 번역을 녹음해보세요';
      audio.ontimeupdate = null;
    }
  };
}

// =====================
// Recording + STT
// =====================
async function getStream() {
  if (sharedStream && sharedStream.active) return sharedStream;
  sharedStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return sharedStream;
}

async function toggleRecord() {
  const btn = document.getElementById('recBtn');

  if (isRecording) {
    mediaRecorder?.stop();
    sttRecognition?.stop();
    isRecording = false;
    btn.textContent = '⏺ 다시 녹음';
    btn.classList.remove('recording');
    return;
  }

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Chrome 또는 Edge 브라우저를 사용해주세요.');
    return;
  }

  try {
    const stream = await getStream();
    const chunks = [];
    mediaRecorder = new MediaRecorder(stream);
    isRecording = true;
    finalTranscript = '';
    btn.textContent = '⏹ 녹음 중지';
    btn.classList.add('recording');
    document.getElementById('transcriptPreview').textContent = '🎙 듣는 중...';
    document.getElementById('resultArea').classList.remove('show');

    // STT (Korean)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    sttRecognition = new SR();
    sttRecognition.lang = 'ko-KR';
    sttRecognition.continuous = true;
    sttRecognition.interimResults = true;

    sttRecognition.onresult = (e) => {
      let interim = '';
      finalTranscript = '';
      for (const r of e.results) {
        if (r.isFinal) finalTranscript += r[0].transcript;
        else interim += r[0].transcript;
      }
      document.getElementById('transcriptPreview').textContent = `"${(finalTranscript || interim).trim()}"`;
    };

    sttRecognition.onend = () => {
      if (finalTranscript.trim()) {
        gradeWithClaude(finalTranscript.trim());
      }
    };

    sttRecognition.start();

    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = () => {
      setTimeout(() => { try { sttRecognition.stop(); } catch(e) {} }, 400);
    };
    mediaRecorder.start();

    // Auto-stop after 15s
    setTimeout(() => {
      if (isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        btn.textContent = '⏺ 다시 녹음';
        btn.classList.remove('recording');
      }
    }, 15000);

  } catch(e) {
    alert('마이크 접근이 거부됐어요. 브라우저에서 마이크를 허용해주세요.');
  }
}

// =====================
// Claude API grading
// =====================
async function gradeWithClaude(userTranslation) {
  const sentence = currentTrack.sentences[currentIndex];
  const original = sentence.text;

  document.getElementById('feedbackBox').innerHTML = '<span class="loading-spinner"></span> AI가 채점 중...';
  document.getElementById('scoreBig').textContent = '';
  document.getElementById('scoreLabel').textContent = '';
  document.getElementById('resultArea').classList.add('show');

  const prompt = `당신은 영어 직역 테스트 채점관입니다.

원문 (영어): "${original}"
학습자 번역 (한국어): "${userTranslation}"

다음 기준으로 채점해주세요:
1. 핵심 의미가 전달됐는가 (가장 중요)
2. 중요한 단어나 내용이 빠지지 않았는가
3. 순서나 표현이 다소 달라도 의미가 맞으면 OK

반드시 아래 JSON 형식으로만 답하세요 (다른 텍스트 없이):
{
  "score": 85,
  "pass": true,
  "feedback": "핵심 의미를 잘 전달했습니다. '놀라운 변화'를 잘 표현했어요.",
  "model_answer": "사진술은 지난 두 세기에 걸쳐 창작, 공유, 이해 방식에서 놀라운 변화를 겪어왔습니다."
}`;

  try {
    const res = await fetch('/api/grade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ original, userTranslation })
    });

    const result = await res.json();

    if (!res.ok) {
      document.getElementById('feedbackBox').textContent = '채점 중 오류가 발생했어요: ' + (result.error || '');
      return;
    }

    showResult(result);
    scores.push(result.score);

  } catch(e) {
    document.getElementById('feedbackBox').textContent = '채점 중 오류가 발생했어요. API 키를 확인해주세요.';
    console.error(e);
  }
}

function showResult(result) {
  const pct = result.score;
  const pass = result.pass;

  document.getElementById('scoreBig').textContent = `${pct}점`;
  document.getElementById('scoreBig').className = `score-big ${pass ? 'pass' : 'fail'}`;
  document.getElementById('scoreLabel').textContent = pass ? '✓ PASS' : '✗ RETRY';
  document.getElementById('scoreLabel').className = `score-label ${pass ? 'pass' : 'fail'}`;
  document.getElementById('feedbackBox').textContent = result.feedback;
  document.getElementById('answerText').textContent = result.model_answer;
}

function toggleAnswer() {
  const box = document.getElementById('answerBox');
  showingAnswer = !showingAnswer;
  box.style.display = showingAnswer ? 'block' : 'none';
  document.querySelector('.btn-nav').textContent = showingAnswer ? '모범 번역 숨기기' : '모범 번역 보기';
}

// =====================
// Navigation
// =====================
function prevSentence() {
  if (currentIndex > 0) {
    currentIndex--;
    showSentence();
  }
}

function nextSentence() {
  currentIndex++;
  showSentence();
}

function showSummary() {
  const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;
  document.getElementById('testCard').style.display = 'none';
  document.getElementById('summaryCard').classList.add('show');
  document.getElementById('summaryScore').textContent = `${avg}점`;
  document.getElementById('summaryScore').className = `summary-score ${avg >= 80 ? 'great' : avg >= 60 ? 'ok' : 'poor'}`;
  document.getElementById('summaryLabel').textContent =
    avg >= 80 ? '훌륭해요! 🎉' :
    avg >= 60 ? '잘 하고 있어요! 조금만 더 연습하면 돼요 💪' :
    '더 연습이 필요해요. 파이팅! 🔥';
  document.getElementById('progressFill').style.width = '100%';
}

function restartTest() {
  currentIndex = 0;
  scores = [];
  showSentence();
}

// =====================
// Init
// =====================
window.addEventListener('DOMContentLoaded', () => {
  checkApiKey();
  renderTrackSelector();
});
</script>
</body>
</html>
