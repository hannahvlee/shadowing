<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청취 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="tracks.js"></script>
<style>
  :root {
    --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #c8f060; --accent2: #60c8f0; --text: #f0ede8; --text-muted: #6e6e6e;
    --text-dim: #3e3e3e; --danger: #f06060; --success: #60f0a0; --warn: #f0c060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%); pointer-events: none; z-index: 0; }
  .container { max-width: 820px; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; flex: 1; }
  .label { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: clamp(28px, 5vw, 42px); line-height: 1.1; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--text-muted); }
  .track-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .track-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .track-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .track-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.06); }

  /* Global controls */
  .global-controls { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-top: 0; margin-bottom: 32px; flex-wrap: wrap; }
  .speed-control { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 200px; }
  .speed-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .speed-value { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); min-width: 36px; text-align: right; }
  input[type="range"] { -webkit-appearance: none; flex: 1; height: 3px; background: var(--border); border-radius: 2px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }

  /* Sentence cards */
  .sentences { display: flex; flex-direction: column; gap: 10px; }
  .sentence-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; transition: all 0.2s; }
  .sentence-card.active { border-color: var(--accent2); background: rgba(96,200,240,0.04); }
  .sentence-card.pass { border-color: rgba(96,240,160,0.3); }
  .sentence-card.fail { border-color: rgba(240,96,96,0.3); }

  .card-top { display: flex; align-items: center; gap: 12px; }
  .sentence-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); min-width: 24px; }
  .card-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid transparent; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-play { background: transparent; border-color: var(--border); color: var(--text); }
  .btn-play:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-play.playing { border-color: var(--accent2); color: var(--accent2); background: rgba(96,200,240,0.08); }
  .btn-record { background: transparent; border-color: var(--border); color: var(--text-muted); padding: 7px 10px; }
  .btn-record:hover { border-color: var(--danger); color: var(--danger); }
  .btn-record.recording { border-color: var(--danger); color: var(--danger); background: rgba(240,96,96,0.1); animation: pulse-red 1s infinite; }
  @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(240,96,96,0.3); } 50% { box-shadow: 0 0 0 4px rgba(240,96,96,0); } }

  /* Result area */
  .result-area { margin-top: 12px; display: none; padding-top: 12px; border-top: 1px solid var(--border); }
  .result-area.show { display: block; }
  .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .score-badge { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
  .score-badge.pass { background: rgba(96,240,160,0.15); color: var(--success); border: 1px solid rgba(96,240,160,0.3); }
  .score-badge.fail { background: rgba(240,96,96,0.12); color: var(--danger); border: 1px solid rgba(240,96,96,0.3); }
  .transcript-text { font-size: 12px; color: var(--text-muted); font-style: italic; flex: 1; }
  .model-answer { margin-top: 8px; display: none; }
  .model-answer.show { display: block; }
  .model-answer-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
  .model-answer-text { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .btn-toggle-answer { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
  .btn-toggle-answer:hover { border-color: var(--accent); color: var(--accent); }

  /* Submit */
  .submit-wrap { margin-top: 32px; text-align: right; }
  .btn-submit { padding: 12px 32px; border-radius: 10px; border: none; background: var(--accent); color: #0e0e0e; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-submit:hover { opacity: 0.85; }

  /* Save modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 340px; max-width: 90vw; }
  .modal-title { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 22px; margin-bottom: 8px; }
  .modal-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; margin-bottom: 16px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel { padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-save { padding: 9px 22px; border-radius: 8px; border: none; background: var(--accent); color: #0e0e0e; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MDELTEL4XC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-MDELTEL4XC');
</script>
</head>
<body>
<div class="container">
  <header>
    <div style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)"><a href="index.html" style="font-family:'DM Mono',monospace;font-size:15px;color:var(--accent2);text-decoration:none;letter-spacing:0.18em;font-weight:700;">🎧 ListenUp!</a></div>
    <h1 id="pageTitle"></h1>
    <p class="subtitle">음원을 듣고 한국어로 직역하세요</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;margin-bottom:24px;" id="modeTabs"></div>
  </header>

  <div class="track-selector" id="trackSelector" style="display:none"></div>

  <div class="global-controls">
    <div class="speed-control">
      <span class="speed-label">Speed</span>
      <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.05" value="1.0">
      <span class="speed-value" id="speedVal">1.0×</span>
    </div>
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;white-space:nowrap;margin-top:8px;">
    <div id="showTextToggle" onclick="toggleText()" style="width:36px;height:20px;background:var(--border);border-radius:10px;position:relative;cursor:pointer;transition:background 0.2s;">
      <div id="toggleThumb" style="width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.2s;"></div>
    </div>
    <span style="font-size:13px;color:var(--text-muted)">Show text</span>
  </label>
  </div>

  <div class="sentences" id="sentenceList"></div>

  <div class="submit-wrap">
    <button class="btn-submit" onclick="openSaveModal()">Submit</button>
  </div>
</div>

<!-- Save modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal-box">
    <div class="modal-title">기록 저장</div>
    <p class="modal-desc">이름을 입력하면 학습 기록이 저장돼요</p>
    <input type="text" class="modal-input" id="saveName" placeholder="이름 입력...">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeSaveModal()">취소</button>
      <button class="btn-save" onclick="saveRecord()">저장</button>
    </div>
  </div>
</div>

<audio id="mainAudio" style="display:none"></audio>

<script>
let currentTrack = null;
let scores = [];
let sessionDetails = [];
let sharedStream = null;
let isRecording = {};
let isGraded = {};
let mediaRecorders = {};
let sttRecognitions = {};
let finalTranscripts = {};
let lastInterim = {};
let currentPlaying = null;

const audio = document.getElementById('mainAudio');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');

// Track selector
function renderTrackSelector() {
  const el = document.getElementById('trackSelector');
  if (TRACKS.length <= 1) el.style.display = 'none';
  const params = new URLSearchParams(window.location.search);
  const trackId = parseInt(params.get('id')) || 1;
  const initialIndex = Math.max(0, TRACKS.findIndex(t => t.id === trackId));
  TRACKS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'track-btn' + (i === initialIndex ? ' active' : '');
    btn.textContent = t.title;
    btn.onclick = () => selectTrack(i, btn);
    el.appendChild(btn);
  });

  // Render mode tabs
  const tabContainer = document.getElementById('modeTabs');
  const tabs = [
    { label: '🎙 쉐도잉', href: 'player.html?id=' + trackId, active: false },
    { label: '🎧 청취 테스트', href: 'listening.html?id=' + trackId, active: true },
    { label: '✏️ 딕테이션', href: 'dictation.html?id=' + trackId, active: false },
    { label: '📝 어휘 테스트', href: 'vocab.html?id=' + trackId, active: false },
  ];
  tabs.forEach(function(t) {
    const a = document.createElement('a');
    a.href = t.href;
    a.textContent = t.label;
    a.style.cssText = 'font-family:\'DM Mono\',monospace;font-size:11px;padding:7px 16px;border-radius:20px;letter-spacing:0.06em;border:1px solid;text-decoration:none;white-space:nowrap;margin-bottom:8px;' + (t.active ? 'background:rgba(200,240,96,0.12);color:var(--accent);border-color:rgba(200,240,96,0.4);' : 'color:var(--text-muted);border-color:var(--border);');
    tabContainer.appendChild(a);
  });

  selectTrack(initialIndex, el.children[initialIndex]);
}

function selectTrack(i, btn) {
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTrack = TRACKS[i];
  audio.src = currentTrack.file;
  document.getElementById('pageTitle').textContent = currentTrack.title;
  scores = [];
  renderSentences();
}

speedSlider.addEventListener('input', () => {
  audio.playbackRate = parseFloat(speedSlider.value);
  speedVal.textContent = parseFloat(speedSlider.value).toFixed(2).replace(/\.?0+$/, '') + '×';
});

// Render sentences
function renderSentences() {
  const list = document.getElementById('sentenceList');
  list.innerHTML = '';
  currentTrack.sentences.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="sentence-num">${String(i+1).padStart(2,'0')}</span>
        <span class="sentence-text" id="text-${i}" style="font-size:13px;color:var(--text-muted);flex:1;display:none;">${s.text}</span>
        <div class="card-actions">
          <button class="btn btn-play" id="play-${i}" onclick="playSegment(${i})">▶ 듣기</button>
          <button class="btn btn-record" id="rec-${i}" onclick="toggleRecord(${i})">⏺</button>
        </div>
      </div>
      <div class="result-area" id="result-${i}">
        <div class="score-row">
          <span class="score-badge" id="badge-${i}"></span>
          <span class="transcript-text" id="transcript-${i}"></span>
        </div>
        <div id="feedback-${i}" style="font-size:13px;color:var(--text-muted);margin-bottom:8px;display:none"></div>
        <button class="btn-toggle-answer" onclick="toggleAnswer(${i})">모범 번역 보기</button>
        <div class="model-answer" id="model-${i}">
          <div class="model-answer-label">모범 번역</div>
          <div class="model-answer-text" id="model-text-${i}"></div>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

// Play
function playSegment(i) {
  const s = currentTrack.sentences[i];
  const btn = document.getElementById(`play-${i}`);
  if (currentPlaying === i && !audio.paused) {
    audio.pause(); btn.textContent = '▶ 듣기'; btn.classList.remove('playing');
    currentPlaying = null; return;
  }
  if (currentPlaying !== null) {
    const prev = document.getElementById(`play-${currentPlaying}`);
    if (prev) { prev.textContent = '▶ 듣기'; prev.classList.remove('playing'); }
    document.getElementById(`card-${currentPlaying}`)?.classList.remove('active');
  }
  currentPlaying = i;
  audio.playbackRate = parseFloat(speedSlider.value);
  audio.currentTime = s.start;
  audio.play();
  btn.textContent = '⏸ 정지'; btn.classList.add('playing');
  document.getElementById(`card-${i}`).classList.add('active');
  audio.ontimeupdate = () => {
    if (audio.currentTime >= s.end) {
      audio.pause(); btn.textContent = '▶ 다시 듣기'; btn.classList.remove('playing');
      document.getElementById(`card-${i}`).classList.remove('active');
      audio.ontimeupdate = null; currentPlaying = null;
    }
  };
}

// Record + STT
async function getStream() {
  if (sharedStream && sharedStream.active) return sharedStream;
  sharedStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return sharedStream;
}

async function toggleRecord(i) {
  const btn = document.getElementById(`rec-${i}`);
  if (isRecording[i]) {
    // Stop recording and trigger grading
    mediaRecorders[i]?.stop();
    try { sttRecognitions[i]?.stop(); } catch(e) {}
    isRecording[i] = false; btn.classList.remove('recording'); btn.textContent = '⏺';
    // Grade with whatever we have
    setTimeout(() => {
      const toGrade = finalTranscripts[i]?.trim() || lastInterim[i]?.trim();
      if (toGrade && !isGraded[i]) gradeWithClaude(i, toGrade);
    }, 500);
    return;
  }
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Chrome 또는 Edge를 사용해주세요.'); return;
  }
  try {
    const stream = await getStream();
    const mr = new MediaRecorder(stream);
    mediaRecorders[i] = mr;
    isRecording[i] = true;
    btn.classList.add('recording'); btn.textContent = '⏹';
    finalTranscripts[i] = '';

    const badge = document.getElementById(`badge-${i}`);
    const transcript = document.getElementById(`transcript-${i}`);
    const resultArea = document.getElementById(`result-${i}`);
    resultArea.classList.add('show');
    badge.className = 'score-badge'; badge.textContent = '🎙 듣는 중...';
    transcript.textContent = '';

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = 'ko-KR'; recognition.continuous = true; recognition.interimResults = true;
    sttRecognitions[i] = recognition;

    recognition.onresult = (e) => {
      let interim = ''; finalTranscripts[i] = '';
      for (const r of e.results) {
        if (r.isFinal) finalTranscripts[i] += r[0].transcript;
        else interim += r[0].transcript;
      }
      lastInterim[i] = interim;
      transcript.textContent = `"${(finalTranscripts[i] || interim).trim()}"`; 
    };

    recognition.onend = () => {
      // Reset recording state
      if (isRecording[i]) {
        isRecording[i] = false;
        btn.classList.remove('recording');
        btn.textContent = '⏺';
      }
      const toGrade = finalTranscripts[i]?.trim() || lastInterim[i]?.trim();
      if (toGrade) gradeWithClaude(i, toGrade);
    };

    recognition.start();
    mr.ondataavailable = () => {};
    mr.onstop = () => { setTimeout(() => { try { recognition.stop(); } catch(e) {} }, 400); };
    mr.start();

    const duration = (currentTrack.sentences[i].end - currentTrack.sentences[i].start) * 1000 + 30000;
    setTimeout(() => {
      if (isRecording[i]) { mr.stop(); isRecording[i] = false; btn.classList.remove('recording'); btn.textContent = '⏺'; }
    }, duration);
  } catch(e) { alert('마이크 접근이 거부됐어요.'); }
}

// Claude grading
async function gradeWithClaude(i, userTranslation) {
  const badge = document.getElementById(`badge-${i}`);
  const modelTextEl = document.getElementById(`model-text-${i}`);
  badge.textContent = '⏳ 채점 중...'; badge.className = 'score-badge';

  try {
    const res = await fetch('/api/grade', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ original: currentTrack.sentences[i].text, userTranslation })
    });
    const result = await res.json();
    if (!res.ok) { badge.textContent = '오류'; return; }

    const pct = result.score;
    const pass = result.pass;
    badge.textContent = pass ? `✓ PASS  ${pct}점` : `✗ RETRY  ${pct}점`;
    badge.className = `score-badge ${pass ? 'pass' : 'fail'}`;

    const card = document.getElementById(`card-${i}`);
    card.classList.remove('pass', 'fail');
    card.classList.add(pass ? 'pass' : 'fail');

    if (result.feedback) {
      const feedbackEl = document.getElementById(`feedback-${i}`);
      if (feedbackEl) { feedbackEl.textContent = result.feedback; feedbackEl.style.display = 'block'; }
    }
    if (result.model_answer) modelTextEl.innerHTML = result.model_answer.replace(/\n/g, '<br>');
    scores[i] = pct;
    isGraded[i] = true;
    sessionDetails[i] = {
      index: i,
      text: currentTrack.sentences[i].text,
      userSaid: userTranslation,
      score: pct,
      feedback: result.feedback || '',
      modelAnswer: result.model_answer || ''
    };
  } catch(e) {
    badge.textContent = '채점 오류'; badge.className = 'score-badge';
  }
}

function toggleAnswer(i) {
  const el = document.getElementById(`model-${i}`);
  const btn = el.previousElementSibling;
  const showing = el.classList.toggle('show');
  btn.textContent = showing ? '모범 번역 숨기기' : '모범 번역 보기';
}

// Save
function openSaveModal() {
  document.getElementById('saveModal').classList.add('show');
  document.getElementById('saveName').focus();
}

function closeSaveModal() {
  document.getElementById('saveModal').classList.remove('show');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('saveModal').classList.contains('show')) saveRecord();
});

let isSaving = false;
async function saveRecord() {
  if (isSaving) return;
  isSaving = true;
  const name = document.getElementById('saveName').value.trim();
  if (!name) { isSaving = false; document.getElementById('saveName').focus(); return; }
  const validScores = scores.filter(s => s != null);
  const avg = validScores.length ? Math.round(validScores.reduce((a,b) => a+b, 0) / validScores.length) : null;
  const progress = `${validScores.length}/${currentTrack.sentences.length}문장`;
  try {
    await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        name, 
        track: currentTrack.title, 
        mode: '청취테스트', 
        score: avg, 
        progress,
        details: sessionDetails.filter(Boolean)
      })
    });
    closeSaveModal();
    window.location.href = 'history.html';
  } catch(e) { alert('저장 중 오류가 발생했어요.'); }
}

let showText = false;
function toggleText() {
  showText = !showText;
  const toggle = document.getElementById('showTextToggle');
  const thumb = document.getElementById('toggleThumb');
  toggle.style.background = showText ? 'var(--accent2)' : 'var(--border)';
  thumb.style.left = showText ? '18px' : '2px';
  document.querySelectorAll('[id^="text-"]').forEach(el => {
    el.style.display = showText ? 'block' : 'none';
  });
}
