<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowing Practice</title>
<script src="tracks.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8f060;
    --accent2: #60c8f0;
    --text: #f0ede8;
    --text-muted: #6e6e6e;
    --text-dim: #3e3e3e;
    --danger: #f06060;
    --success: #60f0a0;
    --warn: #f0c060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,240,96,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(96,200,240,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    margin-bottom: 40px;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .track-selector { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .track-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .track-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .track-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,240,96,0.06); }
  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* Upload zone */


  /* Global controls */
  .global-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 200px;
  }

  .speed-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .speed-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    cursor: pointer;
    margin-top: 4px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Sentence list */
  .sentences {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sentence-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    transition: all 0.2s;
  }

  .sentence-card.active {
    border-color: var(--accent2);
    background: rgba(96,200,240,0.04);
  }

  .sentence-card.pass {
    border-color: rgba(96,240,160,0.3);
  }

  .sentence-card.fail {
    border-color: rgba(240,96,96,0.3);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .sentence-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    padding-top: 3px;
    min-width: 24px;
  }

  .sentence-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    font-weight: 300;
  }

  .sentence-text.blur-text {
    filter: blur(5px);
    user-select: none;
    transition: filter 0.3s;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-play {
    background: transparent;
    border-color: var(--border);
    color: var(--text);
  }

  .btn-play:hover:not(:disabled) {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .btn-play.playing {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(96,200,240,0.08);
  }

  .btn-loop {
    background: transparent;
    border-color: var(--border);
    color: var(--text-muted);
    padding: 7px 10px;
  }

  .btn-loop.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,240,96,0.08);
  }

  .btn-loop:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-record {
    background: transparent;
    border-color: var(--border);
    color: var(--text-muted);
    padding: 7px 10px;
  }

  .btn-record:hover:not(:disabled) {
    border-color: var(--danger);
    color: var(--danger);
  }

  .btn-record.recording {
    border-color: var(--danger);
    color: var(--danger);
    background: rgba(240,96,96,0.1);
    animation: pulse-red 1s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 rgba(240,96,96,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(240,96,96,0); }
  }

  /* Result bar */
  .result-bar {
    margin-top: 12px;
    display: none;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .result-bar.show { display: block; }

  .result-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .score-badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .score-badge.pass {
    background: rgba(96,240,160,0.15);
    color: var(--success);
    border: 1px solid rgba(96,240,160,0.3);
  }

  .score-badge.fail {
    background: rgba(240,96,96,0.12);
    color: var(--danger);
    border: 1px solid rgba(240,96,96,0.3);
  }

  .score-detail {
    font-size: 12px;
    color: var(--text-muted);
    flex: 1;
  }

  .playback-btns {
    display: flex;
    gap: 6px;
  }

  .btn-sm {
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .btn-sm:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .btn-sm.active-play {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(96,200,240,0.08);
  }

  /* Transcript toggle */
  .blur-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }

  .toggle-switch {
    width: 36px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
  }

  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--text-muted);
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: all 0.2s;
  }

  .toggle-switch.on {
    background: rgba(200,240,96,0.2);
  }

  .toggle-switch.on::after {
    left: 19px;
    background: var(--accent);
  }

  /* STT status */
  .stt-status {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 6px;
    display: none;
  }

  .stt-status.show { display: inline-block; }

  /* No audio state */
  .no-audio {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .no-audio .icon { font-size: 48px; margin-bottom: 16px; }
  .no-audio p { font-size: 14px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .card-actions { flex-wrap: wrap; }
    .global-controls { gap: 12px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div style="margin-bottom:16px"><a href="index.html" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;">← Back</a></div>
    <div class="label">🎙 쉐도잉</div>
    <h1 id="pageTitle"></h1>
    <p class="subtitle">음원을 듣고 따라 말하세요</p>
  </header>

  <!-- Track selector -->
  <div class="track-selector" id="trackSelector"></div>

  <!-- Global controls -->
  <div class="global-controls" id="globalControls">
    <div class="speed-control">
      <span class="speed-label">Speed</span>
      <input type="range" id="speedSlider" min="0.5" max="1.5" step="0.05" value="1.0">
      <span class="speed-value" id="speedVal">1.0×</span>
    </div>
    <label class="blur-toggle" id="blurToggle">
      <div class="toggle-switch" id="toggleSwitch"></div>
      <span>Hide text (shadowing mode)</span>
    </label>
  </div>

  <!-- Sentences -->
  <div class="sentences" id="sentenceList">
    <div class="no-audio">
      <div class="icon">🎧</div>
      <p>Loading audio...</p>
    </div>
  </div>

  <!-- Submit button - shown after all sentences -->
  <div id="submitWrap" style="display:block;margin-top:32px;text-align:right;">
    <button onclick="openSaveModal()" style="padding:12px 32px;border-radius:10px;border:none;background:var(--accent);color:#0e0e0e;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Submit</button>
  </div>

  <!-- Save modal -->
  <div id="saveModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:340px;max-width:90vw;">
      <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:8px">기록 저장</div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">이름을 입력하면 학습 기록이 저장돼요</p>
      <input type="text" id="saveName" placeholder="이름 입력..." style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:16px;">
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="closeSaveModal()" style="padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;">취소</button>
        <button onclick="saveRecord()" style="padding:9px 22px;border-radius:8px;border:none;background:var(--accent);color:#0e0e0e;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">저장</button>
      </div>
    </div>
  </div>

</div>

<audio id="mainAudio" style="display:none"></audio>



<script>
const params = new URLSearchParams(window.location.search);
const trackId = parseInt(params.get('id')) || 1;
const track = TRACKS.find(t => t.id === trackId) || TRACKS[0];
const SENTENCES = track.sentences;

const audio = document.getElementById('mainAudio');
const globalControls = document.getElementById('globalControls');
const sentenceList = document.getElementById('sentenceList');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
const blurToggle = document.getElementById('blurToggle');
const toggleSwitch = document.getElementById('toggleSwitch');

// Set page title
document.getElementById('pageTitle').textContent = track.title;

// Render track selector
const trackSelectorEl = document.getElementById('trackSelector');
if (TRACKS.length <= 1) {
  trackSelectorEl.style.display = 'none';
} else {
  TRACKS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'track-btn' + (t.id === trackId ? ' active' : '');
    btn.textContent = t.title;
    btn.onclick = () => { window.location.href = `player.html?id=${t.id}`; };
    trackSelectorEl.appendChild(btn);
  });
}


let currentPlaying = null;
let loopingIndex = null;
let loopInterval = null;
let blurMode = false;
let mediaRecorders = {};
let recordings = {};
let recordingPlayers = {};
let isRecording = {};
let sharedStream = null;

async function getStream() {
  if (sharedStream && sharedStream.active) return sharedStream;
  sharedStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  return sharedStream;
}

// Auto-load audio
window.addEventListener('DOMContentLoaded', () => {
  audio.src = track.file;
  renderSentences();
});

// Speed
speedSlider.addEventListener('input', () => {
  audio.playbackRate = parseFloat(speedSlider.value);
  speedVal.textContent = parseFloat(speedSlider.value).toFixed(2).replace(/\.?0+$/, '') + '×';
});

// Blur toggle
blurToggle.addEventListener('click', () => {
  blurMode = !blurMode;
  toggleSwitch.classList.toggle('on', blurMode);
  document.querySelectorAll('.sentence-text').forEach(el => el.classList.toggle('blur-text', blurMode));
});

// Render sentences
function renderSentences() {
  sentenceList.innerHTML = '';
  SENTENCES.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'sentence-card';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="sentence-num">${String(i+1).padStart(2,'0')}</span>
        <span class="sentence-text${blurMode ? ' blur-text' : ''}" id="text-${i}">${s.text}</span>
        <div class="card-actions">
          <button class="btn btn-loop" id="loop-${i}" onclick="toggleLoop(${i})" title="Loop">⟳</button>
          <button class="btn btn-play" id="play-${i}" onclick="playSegment(${i})">▶ Play</button>
          <button class="btn btn-record" id="rec-${i}" onclick="toggleRecord(${i})" title="Record">⏺</button>
        </div>
      </div>
      <div class="result-bar" id="result-${i}">
        <div class="result-row">
          <span class="score-badge" id="badge-${i}"></span>
          <span class="score-detail" id="detail-${i}"></span>
          <div class="playback-btns">
            <button class="btn-sm" id="playOrig-${i}" onclick="playOriginal(${i})">▶ Original</button>
            <button class="btn-sm" id="playMine-${i}" onclick="playMyRecording(${i})" style="display:none">▶ Mine</button>
          </div>
        </div>
      </div>
    `;
    sentenceList.appendChild(card);
  });
}

// Play segment
function playSegment(i) {
  const s = SENTENCES[i];
  const btn = document.getElementById(`play-${i}`);

  if (currentPlaying === i && !audio.paused) {
    audio.pause();
    btn.textContent = '▶ Play';
    btn.classList.remove('playing');
    currentPlaying = null;
    return;
  }

  stopAll();
  currentPlaying = i;
  audio.playbackRate = parseFloat(speedSlider.value);
  audio.currentTime = s.start;
  audio.play();
  btn.textContent = '⏸ Pause';
  btn.classList.add('playing');
  document.getElementById(`card-${i}`).classList.add('active');

  audio.ontimeupdate = () => {
    if (audio.currentTime >= s.end) {
      if (loopingIndex === i) {
        audio.currentTime = s.start;
        audio.play();
      } else {
        audio.pause();
        btn.textContent = '▶ Play';
        btn.classList.remove('playing');
        document.getElementById(`card-${i}`).classList.remove('active');
        currentPlaying = null;
      }
    }
  };
}

// Save record
let sessionScores = [];
let sessionDetails = []; // stores {index, text, userSaid, score}

function openSaveModal() {
  document.getElementById('saveModal').style.display = 'flex';
  document.getElementById('saveName').focus();
}

function closeSaveModal() {
  document.getElementById('saveModal').style.display = 'none';
  isSaving = false;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('saveModal').style.display === 'flex') {
    saveRecord();
  }
});

let isSaving = false;
async function saveRecord() {
  if (isSaving) return;
  isSaving = true;
  const name = document.getElementById('saveName').value.trim();
  if (!name) { isSaving = false; document.getElementById('saveName').focus(); return; }
  const saveBtn = document.querySelector('.btn-save');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }

  const avg = sessionScores.length
    ? Math.round(sessionScores.reduce((a,b) => a+b, 0) / sessionScores.length)
    : null;
  const progress = `${sessionScores.length}/${SENTENCES.length}문장`;

  try {
    await fetch('/api/records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        track: track.title,
        mode: '쉐도잉',
        score: avg,
        progress,
        details: sessionDetails
      })
    });
    closeSaveModal();
    window.location.href = 'history.html';
  } catch(e) {
    alert('저장 중 오류가 발생했어요.');
  }
}

function stopAll() {
  if (currentPlaying !== null) {
    const prevBtn = document.getElementById(`play-${currentPlaying}`);
    if (prevBtn) { prevBtn.textContent = '▶ Play'; prevBtn.classList.remove('playing'); }
    document.getElementById(`card-${currentPlaying}`)?.classList.remove('active');
  }
  audio.pause();
  audio.ontimeupdate = null;
  currentPlaying = null;
}

// Loop
function toggleLoop(i) {
  const btn = document.getElementById(`loop-${i}`);
  if (loopingIndex === i) {
    loopingIndex = null;
    btn.classList.remove('active');
  } else {
    if (loopingIndex !== null) {
      document.getElementById(`loop-${loopingIndex}`)?.classList.remove('active');
    }
    loopingIndex = i;
    btn.classList.add('active');
    playSegment(i);
  }
}

// Play original from result
function playOriginal(i) {
  document.getElementById(`playOrig-${i}`).classList.add('active-play');
  setTimeout(() => document.getElementById(`playOrig-${i}`)?.classList.remove('active-play'), 500);
  playSegment(i);
}

// Record — STT runs simultaneously during recording
async function toggleRecord(i) {
  const btn = document.getElementById(`rec-${i}`);

  if (isRecording[i]) {
    // Stop both recording and STT
    mediaRecorders[i]?.stop();
    if (window._sttRecognitions && window._sttRecognitions[i]) {
      try { window._sttRecognitions[i].stop(); } catch(e) {}
    }
    isRecording[i] = false;
    btn.classList.remove('recording');
    btn.title = 'Record';
    return;
  }

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition not supported. Please use Chrome or Edge.');
    return;
  }

  try {
    const stream = await getStream();
    const chunks = [];
    const mr = new MediaRecorder(stream);
    mediaRecorders[i] = mr;
    isRecording[i] = true;
    btn.classList.add('recording');
    btn.title = 'Stop';

    // Show analyzing immediately
    const resultBar = document.getElementById(`result-${i}`);
    const badge = document.getElementById(`badge-${i}`);
    const detail = document.getElementById(`detail-${i}`);
    resultBar.classList.add('show');
    badge.className = 'score-badge';
    badge.textContent = '🎙 Listening...';
    detail.textContent = '';

    // Start STT simultaneously
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = true;
    recognition.interimResults = true;

    if (!window._sttRecognitions) window._sttRecognitions = {};
    window._sttRecognitions[i] = recognition;

    let finalTranscript = '';

    recognition.onresult = (e) => {
      let interim = '';
      finalTranscript = '';
      for (let r of e.results) {
        if (r.isFinal) finalTranscript += r[0].transcript;
        else interim += r[0].transcript;
      }
      // Show interim result live
      detail.textContent = `"${(finalTranscript || interim).trim()}"`;
    };

    recognition.onerror = (e) => {
      if (e.error !== 'aborted') {
        showResult(i, null, 'Could not analyze. Speak clearly and try again.');
      }
    };

    recognition.onend = () => {
      // Only score if we got a transcript
      if (finalTranscript.trim()) {
        const transcript = finalTranscript.toLowerCase().trim();
        const original = SENTENCES[i].text.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
        const score = similarity(transcript, original);
        showResult(i, score, finalTranscript.trim());
      }
    };

    recognition.start();

    // Save recording blob
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = () => {
      
      const blob = new Blob(chunks, { type: 'audio/webm' });
      recordings[i] = URL.createObjectURL(blob);
      document.getElementById(`playMine-${i}`).style.display = 'inline-block';
      // Stop STT shortly after recording ends
      setTimeout(() => {
        try { recognition.stop(); } catch(e) {}
      }, 400);
    };

    mr.start();

    // Auto-stop
    const duration = (SENTENCES[i].end - SENTENCES[i].start) * 1000 + 4000;
    setTimeout(() => {
      if (isRecording[i]) {
        mr.stop();
        isRecording[i] = false;
        btn.classList.remove('recording');
        btn.title = 'Record';
      }
    }, duration);

  } catch(e) {
    alert('Microphone access denied. Please allow microphone access in your browser.');
  }
}

function playMyRecording(i) {
  if (!recordings[i]) return;
  const player = new Audio(recordings[i]);
  player.play();
  const btn = document.getElementById(`playMine-${i}`);
  btn.classList.add('active-play');
  player.onended = () => btn.classList.remove('active-play');
}

function showResult(i, score, transcript) {
  const badge = document.getElementById(`badge-${i}`);
  const detail = document.getElementById(`detail-${i}`);
  const card = document.getElementById(`card-${i}`);

  if (score === null) {
    badge.textContent = '— N/A';
    badge.className = 'score-badge';
    detail.textContent = transcript;
    return;
  }

  const pct = Math.round(score * 100);
  const pass = pct >= 80;
  badge.textContent = pass ? `✓ PASS  ${pct}%` : `✗ RETRY  ${pct}%`;
  badge.className = `score-badge ${pass ? 'pass' : 'fail'}`;
  detail.textContent = `"${transcript}"`;
  card.classList.remove('pass', 'fail');
  card.classList.add(pass ? 'pass' : 'fail');
  sessionScores.push(pct);
  sessionDetails.push({
    index: i,
    text: SENTENCES[i].text,
    userSaid: finalTranscript.trim(),
    score: pct
  });
}

// Strict similarity — penalizes missing words, wrong order, bad pronunciation
function similarity(a, b) {
  const normalize = s => s.toLowerCase()
    .replace(/['']/g, "'")
    .replace(/won't/g, 'will not').replace(/can't/g, 'cannot')
    .replace(/n't/g, ' not').replace(/'re/g, ' are').replace(/'ve/g, ' have')
    .replace(/'ll/g, ' will').replace(/'d/g, ' would').replace(/'m/g, ' am')
    .replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();

  const wa = normalize(a).split(' ');
  const wb = normalize(b).split(' ');

  // 1. Word coverage (recall): penalize missing words heavily
  let covered = 0;
  const usedSpoken = new Array(wa.length).fill(false);
  for (const orig of wb) {
    let best = 0, bestIdx = -1;
    for (let k = 0; k < wa.length; k++) {
      if (usedSpoken[k]) continue;
      const s = wordSim(wa[k], orig);
      if (s > best) { best = s; bestIdx = k; }
    }
    if (best > 0.6) { covered += best; if (bestIdx >= 0) usedSpoken[bestIdx] = true; }
  }
  const recall = covered / wb.length;

  // 2. Order penalty: check if matched words appear in correct sequence
  const matchedIndices = [];
  const usedB = new Array(wb.length).fill(false);
  for (let k = 0; k < wa.length; k++) {
    for (let m = 0; m < wb.length; m++) {
      if (usedB[m] && wordSim(wa[k], wb[m]) > 0.7) { matchedIndices.push(m); usedB[m] = true; break; }
    }
  }
  let orderScore = 1.0;
  if (matchedIndices.length > 1) {
    let inversions = 0;
    for (let x = 0; x < matchedIndices.length - 1; x++)
      for (let y = x + 1; y < matchedIndices.length; y++)
        if (matchedIndices[x] > matchedIndices[y]) inversions++;
    const maxInv = matchedIndices.length * (matchedIndices.length - 1) / 2;
    orderScore = maxInv > 0 ? 1 - (inversions / maxInv) : 1;
  }

  // 3. Pronunciation strictness: require >0.75 similarity per word (not just >0.6)
  let strictCovered = 0;
  for (const orig of wb) {
    let best = 0;
    for (const w of wa) { const s = wordSim(w, orig); if (s > best) best = s; }
    if (best > 0.75) strictCovered += best;
  }
  const strictRecall = strictCovered / wb.length;

  // Final score: heavy weight on recall + order + strict pronunciation
  return recall * 0.35 + strictRecall * 0.45 + orderScore * 0.20;
}

function wordSim(a, b) {
  if (a === b) return 1;
  if (!a || !b) return 0;
  if (Math.abs(a.length - b.length) > Math.max(a.length, b.length) * 0.5) return 0;
  const dist = editDistance(a, b);
  const maxLen = Math.max(a.length, b.length);
  const raw = 1 - dist / maxLen;
  // Penalize short word mismatches more
  const lengthPenalty = maxLen <= 3 ? 1.2 : 1.0;
  return Math.max(0, raw / lengthPenalty);
}

function editDistance(a, b) {
  const dp = Array.from({length: a.length + 1}, (_, i) =>
    Array.from({length: b.length + 1}, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= a.length; i++)
    for (let j = 1; j <= b.length; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[a.length][b.length];
}
